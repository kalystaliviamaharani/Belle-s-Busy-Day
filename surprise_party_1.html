<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Belle's Busy Day</title>
<link href="../css/style.css" rel="stylesheet">
<script src="../jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function() {

    let progress = 0;

    $(".dialogue-box").click(function() {

        console.log(progress)
        progress++;
        if (progress == 1) {
            $(".dialogue-text").html("AAHHH!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

         if (progress == 2) {
            $(".dialogue-text").html("Oh, it's you guys!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

         if (progress == 3) {
            $(".dialogue-text").html("What’s going on? Why are you all here?");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 4) {
            window.location.href = "surprise_party_2.html";
        }
    })

});
</script>
</head>

<body>

<div id="stage">

    <img src="../images/surprise_party_1.png" id="bg1">

    <div id="fadeScreen"></div>

    <div class="dialogue-box">
        <img
        class="portrait"
        src="../images/bea_emote_cheerful.png"
        alt="Belle portrait"
        >

        <div class="dialogue-content">
            <p class="character-name">Bea, Alfie, Yuki</p>
            <p class="dialogue-text">
                SURPRISE!
            </p>
        </div>
    </div>

</div>

</body>
</html>
