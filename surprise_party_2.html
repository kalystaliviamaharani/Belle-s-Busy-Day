<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Belle's Busy Day</title>
<link href="../css/style.css" rel="stylesheet">
<script src="../jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function() {

    let progress = 0;

    $(".dialogue-box").click(function() {

        console.log(progress)
        progress++;
        if (progress == 1) {
            $(".dialogue-text").html("You’re always helping everyone else out...");
            $(".character-name").html("Alfie");
            $(".portrait").attr('src', '../images/alfie_emote_smirk.png');
        }

         if (progress == 2) {
            $(".dialogue-text").html("So this time, we wanted to do something for you.");
            $(".character-name").html("Yuki");
            $(".portrait").attr('src', '../images/yuki_emote_cheerful.png');
        }

         if (progress == 3) {
            $(".dialogue-text").html("...Wait.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

         if (progress == 4) {
            $(".dialogue-text").html("So THAT’S why everybody was busy today?!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 5) {
            $(".dialogue-text").html("I wasn’t actually helping my friend film a project.");
            $(".character-name").html("Alfie");
            $(".portrait").attr('src', '../images/alfie_emote_happy.png');
        }

        if (progress == 6) {
            $(".dialogue-text").html("HA! I knew it, I saw you fidgeting!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 7) {
            $(".dialogue-text").html("H-hey! I tried! It was for a good cause!");
            $(".character-name").html("Alfie");
            $(".portrait").attr('src', '../images/alfie_emote_cry.png');
        }

        if (progress == 8) {
            $(".dialogue-text").html("And I wasn’t really staying back because my boss told me to.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 9) {
            $(".dialogue-text").html("...so you made me decorate those pastries for free?!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 10) {
            $(".dialogue-text").html("...maybe a little.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 11) {
            $(".dialogue-text").html("BEAAA!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_annoyed.png');
        }

        if (progress == 12) {
            $(".dialogue-text").html("And the flowers we collected...");
            $(".character-name").html("Yuki");
            $(".portrait").attr('src', '../images/yuki_emote_happy.png');
        }

        if (progress == 13) {
            $(".dialogue-text").html("...were decorations?");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 14) {
            $(".dialogue-text").html("Mhm.");
            $(".character-name").html("Yuki");
            $(".portrait").attr('src', '../images/yuki_emote_happy.png');
        }

        if (progress == 15) {
            $(".dialogue-text").html("You guys... are terrible at keeping secrets.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 16) {
            $(".dialogue-text").html("Hey, speak for yourself. You almost found the banner in my bag earlier.");
            $(".character-name").html("Alfie");
            $(".portrait").attr('src', '../images/alfie_emote_glance.png');
        }

        if (progress == 17) {
            $(".dialogue-text").html("THAT was what you were hiding?!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 18) {
            $(".dialogue-text").html("We really wanted this to make you smile.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_happy.png');
        }

        if (progress == 19) {
            $(".dialogue-text").html("You do so much for all of us, Belle.");
            $(".character-name").html("Yuki");
            $(".portrait").attr('src', '../images/yuki_emote_happy.png');
        }

        if (progress == 20) {
            $(".dialogue-text").html("So we thought you deserved a proper thank-you.");
            $(".character-name").html("Yuki");
            $(".portrait").attr('src', '../images/yuki_emote_cheerful.png');
        }

        if (progress == 21) {
            $(".dialogue-text").html("...You guys.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_cheerful.png');
        }

        if (progress == 22) {
            window.location.href = "surprise_party_3.html";
        }
    })

});
</script>
</head>

<body>

<div id="stage">

    <img src="../images/surprise_party_1.png" id="bg1">

    <div id="fadeScreen"></div>

    <div class="dialogue-box">
        <img
        class="portrait"
        src="../images/bea_emote_cheerful.png"
        alt="Bea portrait"
        >

        <div class="dialogue-content">
            <p class="character-name">Bea</p>
            <p class="dialogue-text">
                Belle, we want to throw a surprise party just for you!
            </p>
        </div>
    </div>

</div>

</body>
</html>
