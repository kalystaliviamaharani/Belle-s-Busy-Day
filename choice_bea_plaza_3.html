<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Belle's Busy Day</title>
<link href="../css/style.css" rel="stylesheet">
<script src="../jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function() {

    let progress = 0;

    $(".dialogue-box").click(function() {

        console.log(progress)
        progress++;
        if (progress == 1) {
            $(".dialogue-text").html("You’ve seriously helped me in this rush hour!");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_cheerful.png');
        }

        if (progress == 2) {
            $(".dialogue-text").html("It’s no problem at all!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_cheerful.png');
        }

        if (progress == 3) {
            $(".dialogue-text").html("Oh also...");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 4) {
            $(".dialogue-text").html("Would you still be able to come with me to the cinema later?");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 5) {
            $(".dialogue-text").html("I’m sorry, Belle... my boss is keeping me until the afternoon today.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 6) {
            $(".dialogue-text").html("I’m afraid I won’t be done until after the movie is finished.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 7) {
            $(".dialogue-text").html("Oh...");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_glance.png');
        }

        if (progress == 8) {
            $(".dialogue-text").html("...I’m really sorry Belle! I hope that’s alright with you!");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 9) {
            $(".dialogue-text").html("We can still see the movies another time!");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 10) {
            $(".dialogue-text").html("It’s alright, Bea. We’ll catch up later.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 11) {
            $(".dialogue-text").html("*Bea is so hardworking, and she’s really busy… maybe someone else is free today.*");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_sad.png');
        }

        if (progress == 12) {
            window.location.href = "choices.html";
        }
    })

});
</script>
</head>

<body>

<div id="stage">

    <img src="../images/bea_plaza_2.png" id="bg1">

    <div id="fadeScreen"></div>

    <div class="dialogue-box">
        <img
        class="portrait"
        src="../images/bea_emote_happy.png"
        alt="Bea portrait"
        >

        <div class="dialogue-content">
            <p class="character-name">Bea</p>
            <p class="dialogue-text">
                Thank you Belle for your help.
            </p>
        </div>
    </div>

</div>

</body>
</html>
