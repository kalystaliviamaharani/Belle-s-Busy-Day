<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Belle's Busy Day</title>
<link href="../css/style.css" rel="stylesheet">
<script src="../jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function() {

    let progress = 0;

    $(".dialogue-box").click(function() {

        console.log(progress)
        progress++;
        if (progress == 1) {
            $(".dialogue-text").html("I think she was trying to find this really pretty flower.");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 2) {
            $(".dialogue-text").html("It was so red and it had huge petals!");
            $(".portrait").attr('src', '../images/belle_emote_cheerful.png');
        }

        if (progress == 3) {
            $(".dialogue-text").html("She wants to grow these flowers of her own one day.");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 4) {
            $(".dialogue-text").html("I hope she’ll be able to find them.");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 5) {
            window.location.href = "choices.html";
        }
    })

});
</script>
</head>

<body>

<div id="stage">

    <img src="../images/yuki_intro.png" id="bg1">

    <div id="fadeScreen"></div>

    <div class="dialogue-box">
        <img
        class="portrait"
        src="../images/belle_emote_surprise.png"
        alt="Belle portrait"
        >

        <div class="dialogue-content">
            <p class="character-name">Belle</p>
            <p class="dialogue-text">
                Last week Yuki was kind of busy with her botany studies...
            </p>
        </div>
    </div>

</div>

</body>
</html>
