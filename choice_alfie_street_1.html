<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Belle's Busy Day</title>
<link href="../css/style.css" rel="stylesheet">
<script src="../jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function() {

    let progress = 0;

    $(".dialogue-box").click(function() {

        console.log(progress)
        progress++;
        if (progress == 1) {
            $(".dialogue-text").html("AH!");
            $(".character-name").html("Alfie");
            $(".portrait").attr('src', '../images/alfie_emote_cry.png');
        }

         if (progress == 2) {
            window.location.href = "choice_alfie_street_2.html";
        }
    })

});
</script>
</head>

<body>

<div id="stage">

    <img src="../images/alfie_street_1.png" id="bg1">

    <div id="fadeScreen"></div>

    <div class="dialogue-box">
        <img
        class="portrait"
        src="../images/belle_emote_surprise.png"
        alt="Belle portrait"
        >

        <div class="dialogue-content">
            <p class="character-name">Belle</p>
            <p class="dialogue-text">
                Alfie? What are you doing?
            </p>
        </div>
    </div>

</div>

</body>
</html>
