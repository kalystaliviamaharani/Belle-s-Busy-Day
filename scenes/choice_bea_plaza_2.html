<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Belle's Busy Day</title>
<link href="../css/style.css" rel="stylesheet">
<script src="../jquery-4.0.0.min.js"></script>

<script>
$(document).ready(function() {

    let progress = 0;

    $(".dialogue-box").click(function() {

        console.log(progress)
        progress++;
        if (progress == 1) {
            $(".dialogue-text").html("Eh, nothing much... other than Alfie, who hasn’t been answering my texts!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 2) {
            $(".dialogue-text").html("Oh?");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_happy.png');
        }

        if (progress == 3) {
            $(".dialogue-text").html("I wanted to borrow his skateboard today.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 4) {
            $(".dialogue-text").html("He was supposed to be teaching me how to do his cool skateboarding tricks...");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_glance.png');
        }

        if (progress == 5) {
            $(".dialogue-text").html("I'm just mad he left me on read!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_annoyed.png');
        }

        if (progress == 6) {
            $(".dialogue-text").html("Oh dear...");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 7) {
            $(".dialogue-text").html("Oh, it looks like you’re making a lot of pastries today.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 8) {
            $(".dialogue-text").html("Yeah, a whole lot of them... it seems like these are the hits this time around.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_happy.png');
        }

        if (progress == 9) {
            $(".dialogue-text").html("We’ve got egg tarts, pies, croissants...");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_happy.png');
        }

        if (progress == 10) {
            $(".dialogue-text").html("Bea! Have you checked the oven?");
            $(".character-name").html("Chef");
            $(".portrait").attr('src', '../images/chef_npc.png');
        }

        if (progress == 11) {
            $(".dialogue-text").html("Coming!");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_glance.png');
        }

        if (progress == 12) {
            $(".dialogue-text").html("Are you sure you’ll be able to carry all that? It looks really heavy.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 13) {
            $(".dialogue-text").html("Yeah, but I'll be fine.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_glance.png');
        }

        if (progress == 14) {
            $(".dialogue-text").html("I don’t think you should carry these all by yourself.");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_surprise.png');
        }

        if (progress == 15) {
            $(".dialogue-text").html("I want to help!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 16) {
            $(".dialogue-text").html("Are you sure about this?");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_glance.png');
        }

        if (progress == 17) {
            $(".dialogue-text").html("Yeah!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_cheerful.png');
        }

        if (progress == 18) {
            $(".dialogue-text").html("Well, we have a lot of pastries we needed to make.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_glance.png');
        }

        if (progress == 19) {
            $(".dialogue-text").html("One of our staff members couldn’t make it today, and they were supposed to be in charge of decorating the pastry...");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_worry.png');
        }

        if (progress == 20) {
            $(".dialogue-text").html("Which is why my boss decided I needed to stay back to do more work.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_worry.png');
        }

        if (progress == 21) {
            $(".dialogue-text").html("But it would mean a lot if you could help.");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_guilt.png');
        }

        if (progress == 22) {
            $(".dialogue-text").html("Yeah of course!");
            $(".character-name").html("Belle");
            $(".portrait").attr('src', '../images/belle_emote_happy.png');
        }

        if (progress == 23) {
            $(".dialogue-text").html("Thank you Belle!");
            $(".character-name").html("Bea");
            $(".portrait").attr('src', '../images/bea_emote_cheerful.png');
        }

        if (progress == 24) {
            window.location.href = "choice_bea_plaza_minigame.html";
        }
    })

});
</script>
</head>

<body>

<div id="stage">

    <img src="../images/bea_plaza_2.png" id="bg1">

    <div id="fadeScreen"></div>

    <div class="dialogue-box">
        <img
        class="portrait"
        src="../images/bea_emote_cheerful.png"
        alt="Bea portrait"
        >

        <div class="dialogue-content">
            <p class="character-name">Bea</p>
            <p class="dialogue-text">
                Oh, hey Belle! How're you doing?
            </p>
        </div>
    </div>

</div>

</body>
</html>
